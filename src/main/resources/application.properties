spring.application.name=reciclahub

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:RM566522}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:100906}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none

# ===============================
# FLYWAY
# ===============================
spring.flyway.baselineOnMigrate=true
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}

# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8080}
server.error.include-stacktrace=never

# ===============================
# JWT / SECURITY
# ===============================
# Base64 key (at least 256 bits / 32 bytes). In production set via environment variable.
security.jwt.secret=${JWT_SECRET:Y2hhdmVTZWNyZXRhUmVjaWNsYUh1Yk11ZGFyRW1Qcm9kdWNhb1BvckZhdm9yMjAyNg==}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
security.jwt.issuer=${JWT_ISSUER:reciclahub-api}
